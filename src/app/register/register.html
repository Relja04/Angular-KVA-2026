<form>
        <div class="slika-box">
            <img class="slika" src="/pozadina.jpg">
            <p>
                Zabava<br> shop
            </p>
            <div class="ikonice">
                <img class="ikona" src="/instagram.png">
                <img class="ikona" src="/youtube.png">
                <img class="ikona" src="/email-black-envelope-shape.png">
            </div>
        </div>
        <div class="login-box">
            <div class="input-box">
                <input type="text" class="input" placeholder="Email" name="email" autocomplete="off" id="email">
            </div>
            <label id="error-email"></label>
            <div class="input-box">
                <input type="text" class="input" placeholder="Username" name="username" autocomplete="off" id="username">
            </div>
            <div class="input-box">
                <input type="password" class="input" placeholder="Password" name="password" autocomplete="off" id="password">
            </div>
            <div class="input-box">
                <input type="password" class="input" placeholder="Confirm Password" name="passwordconfirm" autocomplete="off" id="passwordConf">
            </div>
            <label id="error-password"></label>
            <div class="login-btn">
                <button type="button" (click)="doRegister()">Register</button>
            </div>
            <label id="register">Already have an account? <a routerLink="/login">Login</a></label>
        </div>
    </form>
